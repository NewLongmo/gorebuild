services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-dw0rdwk}
      MYSQL_USER: ${MYSQL_USER:-dw0rdwk}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-dw0rdwk}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: ${APP_ENV:-development}
      HTTP_ADDR: ${HTTP_ADDR:-:8080}
      HTTP_READ_TIMEOUT_SECONDS: ${HTTP_READ_TIMEOUT_SECONDS:-15}
      HTTP_WRITE_TIMEOUT_SECONDS: ${HTTP_WRITE_TIMEOUT_SECONDS:-30}
      HTTP_IDLE_TIMEOUT_SECONDS: ${HTTP_IDLE_TIMEOUT_SECONDS:-60}
      HTTP_SHUTDOWN_TIMEOUT_SECONDS: ${HTTP_SHUTDOWN_TIMEOUT_SECONDS:-10}
      HTTP_BODY_LIMIT_MB: ${HTTP_BODY_LIMIT_MB:-4}
      HTTP_PREFORK: ${HTTP_PREFORK:-false}
      AUTH_SECRET: ${AUTH_SECRET:-change-me-before-public-deploy}
      AUTH_TOKEN_TTL_HOURS: ${AUTH_TOKEN_TTL_HOURS:-24}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:5173,http://localhost:8081}
      MYSQL_HOST: mysql
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_USER: ${MYSQL_USER:-dw0rdwk}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-dw0rdwk}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-dw0rdwk}
      MYSQL_MAX_OPEN_CONNS: ${MYSQL_MAX_OPEN_CONNS:-64}
      MYSQL_MAX_IDLE_CONNS: ${MYSQL_MAX_IDLE_CONNS:-16}
      MYSQL_CONN_MAX_LIFETIME_MINUTES: ${MYSQL_CONN_MAX_LIFETIME_MINUTES:-30}
      MYSQL_CONN_MAX_IDLE_MINUTES: ${MYSQL_CONN_MAX_IDLE_MINUTES:-5}
      DB_AUTO_MIGRATE: ${DB_AUTO_MIGRATE:-true}
      DB_SEED_DEFAULTS: ${DB_SEED_DEFAULTS:-true}
      BOOTSTRAP_ADMIN_ACCOUNT: ${BOOTSTRAP_ADMIN_ACCOUNT:-admin}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-admin123}
      BOOTSTRAP_ADMIN_NAME: ${BOOTSTRAP_ADMIN_NAME:-Administrator}
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_PREFIX: ${REDIS_PREFIX:-dw0rdwk:}
      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      REDIS_POOL_SIZE: ${REDIS_POOL_SIZE:-32}
      REDIS_MIN_IDLE_CONNS: ${REDIS_MIN_IDLE_CONNS:-8}
      REDIS_DIAL_TIMEOUT_MS: ${REDIS_DIAL_TIMEOUT_MS:-2000}
      REDIS_READ_TIMEOUT_MS: ${REDIS_READ_TIMEOUT_MS:-1000}
      REDIS_WRITE_TIMEOUT_MS: ${REDIS_WRITE_TIMEOUT_MS:-1000}
      REDIS_POOL_TIMEOUT_MS: ${REDIS_POOL_TIMEOUT_MS:-2000}
      ORDER_WORKER_ENABLED: ${ORDER_WORKER_ENABLED:-true}
      ORDER_WORKER_CONCURRENCY: ${ORDER_WORKER_CONCURRENCY:-2}
      ORDER_WORKER_MAX_ATTEMPTS: ${ORDER_WORKER_MAX_ATTEMPTS:-3}
      ORDER_WORKER_RETRY_DELAY_MS: ${ORDER_WORKER_RETRY_DELAY_MS:-1000}
      ORDER_QUEUE_RECOVER_ON_START: ${ORDER_QUEUE_RECOVER_ON_START:-true}
      ORDER_QUEUE_RECOVERY_BATCH_SIZE: ${ORDER_QUEUE_RECOVERY_BATCH_SIZE:-500}
      CONNECTOR_CRON_ENABLED: ${CONNECTOR_CRON_ENABLED:-true}
      CONNECTOR_CRON_ORDER_INTERVAL_SECONDS: ${CONNECTOR_CRON_ORDER_INTERVAL_SECONDS:-300}
      CONNECTOR_CRON_PRICE_INTERVAL_SECONDS: ${CONNECTOR_CRON_PRICE_INTERVAL_SECONDS:-300}
      CONNECTOR_CRON_MAX_PAGES: ${CONNECTOR_CRON_MAX_PAGES:-20}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/readyz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    ports:
      - "8081:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
